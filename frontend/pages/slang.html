<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>嘴替 ZTalk — 职场黑话翻译器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg-dark: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #252540;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --border: #2d2d4a;
      --yellow: #fbbf24;
      --green: #22c55e;
      --red: #ef4444;
      --purple: #a855f7;
    }
    body{font-family:'Noto Sans SC',sans-serif;background:var(--bg-dark);color:var(--text-primary);min-height:100vh}
    
    /* 顶部导航 */
    .header{background:linear-gradient(135deg,var(--bg-card) 0%,#1e1e3f 100%);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .header-left{display:flex;align-items:center;gap:12px}
    .logo{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header-nav{display:flex;gap:8px}
    .nav-btn{padding:8px 16px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;transition:all 0.2s;font-size:14px}
    .nav-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
    .nav-btn:hover:not(.active){background:var(--bg-card-hover)}
    
    /* 主容器 */
    .container{max-width:1200px;margin:0 auto;padding:24px}
    
    /* 英雄区 */
    .hero{text-align:center;padding:40px 20px;margin-bottom:32px}
    .hero-title{font-size:36px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,#fff 0%,#a0a0b0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero-subtitle{font-size:18px;color:var(--text-secondary);max-width:600px;margin:0 auto 24px}
    .hero-tags{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .hero-tag{padding:6px 14px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border);font-size:13px;color:var(--text-secondary)}
    
    /* 主输入区 */
    .input-section{background:var(--bg-card);border-radius:16px;padding:32px;margin-bottom:32px;border:1px solid var(--border)}
    .input-wrapper{position:relative;margin-bottom:16px}
    .main-input{width:100%;padding:20px 24px;border-radius:12px;border:2px solid var(--border);background:var(--bg-dark);color:white;font-size:18px;transition:border-color 0.2s;outline:none}
    .main-input:focus{border-color:var(--primary)}
    .main-input::placeholder{color:var(--text-secondary)}
    .input-actions{display:flex;gap:12px;justify-content:flex-end}
    .btn{ padding:12px 28px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.2s;border:none}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(99,102,241,0.4)}
    .btn-secondary{background:var(--bg-card-hover);color:var(--text-primary);border:1px solid var(--border)}
    .btn-secondary:hover{background:var(--border)}
    
    /* Tab 切换 */
    .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .tab{padding:10px 20px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;transition:all 0.2s;font-size:14px;font-weight:500}
    .tab.active{background:var(--primary);color:white;border-color:var(--primary)}
    .tab:hover:not(.active){background:var(--bg-card-hover)}
    
    /* 场景卡片网格 */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:40px}
    .scene-card{background:var(--bg-card);border-radius:16px;padding:24px;border:1px solid var(--border);transition:all 0.3s;cursor:pointer}
    .scene-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 30px rgba(99,102,241,0.15)}
    .card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .card-icon.yellow{background:rgba(251,191,36,0.15);color:var(--yellow)}
    .card-icon.green{background:rgba(34,197,94,0.15);color:var(--green)}
    .card-icon.red{background:rgba(239,68,68,0.15);color:var(--red)}
    .card-icon.purple{background:rgba(168,85,247,0.15);color:var(--purple)}
    .card-title{font-weight:600;font-size:16px}
    .card-desc{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
    .slang-list{display:flex;flex-direction:column;gap:8px}
    .slang-item{padding:10px 14px;border-radius:8px;background:var(--bg-dark);font-size:14px;transition:all 0.2s;cursor:pointer}
    .slang-item:hover{background:var(--bg-card-hover);padding-left:18px}
    .slang-item::before{content:'→ ';color:var(--primary)}
    
    /* 解析结果区 */
    .parser-result{background:var(--bg-card);border-radius:16px;padding:32px;margin-bottom:32px;border:1px solid var(--border);display:none}
    .parser-result.show{display:block;animation:fadeIn 0.3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    
    .result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px}
    .result-title{font-size:20px;font-weight:600;display:flex;align-items:center;gap:12px}
    .result-slang{color:var(--primary)}
    .risk-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500}
    .risk-low{background:rgba(34,197,94,0.15);color:var(--green)}
    .risk-medium{background:rgba(251,191,36,0.15);color:var(--yellow)}
    .risk-high{background:rgba(239,68,68,0.15);color:var(--red)}
    
    .parser-layers{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-bottom:24px}
    .layer-card{background:var(--bg-dark);border-radius:12px;padding:20px;border-left:4px solid var(--primary)}
    .layer-card.surface{border-left-color:var(--green)}
    .layer-card.hidden{border-left-color:var(--red)}
    .layer-card.scene{border-left-color:var(--yellow)}
    .layer-card.strategy{border-left-color:var(--purple)}
    .layer-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .layer-icon{font-size:20px}
    .layer-title{font-weight:600;font-size:15px}
    .layer-content{font-size:14px;color:var(--text-secondary);line-height:1.7}
    
    /* AI 延伸学习 */
    .ai-extensions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;padding-top:24px;border-top:1px solid var(--border)}
    .ext-btn{padding:12px 20px;border-radius:10px;background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);cursor:pointer;transition:all 0.2s;font-size:14px;display:flex;align-items:center;gap:8px}
    .ext-btn:hover{background:var(--primary);border-color:var(--primary)}
    .ext-btn .arrow{color:var(--primary)}
    .ext-btn:hover .arrow{color:white}
    
    /* 训练区 */
    .training-section{background:var(--bg-card);border-radius:16px;padding:32px;border:1px solid var(--border);margin-bottom:32px}
    .training-title{font-size:20px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px}
    .training-title .emoji{font-size:24px}
    .training-subtitle{color:var(--text-secondary);margin-bottom:24px;font-size:14px}
    .training-input-group{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .training-input{flex:1;min-width:280px;padding:16px;border-radius:10px;border:2px solid var(--border);background:var(--bg-dark);color:white;font-size:15px;outline:none}
    .training-input:focus{border-color:var(--primary)}
    .training-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
    .training-card{padding:20px;border-radius:12px;background:var(--bg-dark)}
    .training-card.normal{border-left:4px solid var(--red)}
    .training-card.work{border-left:4px solid var(--yellow)}
    .training-card.smart{border-left:4px solid var(--green)}
    .training-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-weight:600}
    .training-card-content{font-size:14px;color:var(--text-secondary);line-height:1.6}
    
    /* 脚注 */
    .footer{text-align:center;padding:40px;color:var(--text-secondary);font-size:13px}
    .footer a{color:var(--primary);text-decoration:none}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo">嘴替 ZTalk</div>
      <div class="hero-tags">
        <span class="hero-tag">🔥 认知放大器</span>
        <span class="hero-tag">🧠 潜台词解析</span>
        <span class="hero-tag">💼 职场必备</span>
      </div>
    </div>
    <div class="header-nav">
      <button class="nav-btn active" onclick="switchTab('parser')">🔍 黑话解析</button>
      <button class="nav-btn" onclick="switchTab('list')">📚 黑话大全</button>
      <button class="nav-btn" onclick="switchTab('training')">🎯 训练场</button>
    </div>
  </header>

  <main class="container">
    <!-- 英雄区 -->
    <section class="hero" id="hero-section">
      <h1 class="hero-title">你以为你听懂了，其实这些都是职场黑话</h1>
      <p class="hero-subtitle">输入任何职场暗语，AI 帮你翻译成大白话，并给出最佳应对策略</p>
      <div class="hero-tags">
        <span class="hero-tag">💡 输入示例："这个方案不错"</span>
        <span class="hero-tag">💡 输入示例："我们再看看"</span>
        <span class="hero-tag">💡 输入示例："你很有潜力"</span>
      </div>
    </section>

    <!-- 主输入区 -->
    <section class="input-section" id="input-section">
      <div class="input-wrapper">
        <input type="text" class="main-input" id="slang-input" placeholder="输入任何职场黑话，例如：'这个方向不错'、'我再想想'、'我们同步一下'" autocomplete="off">
      </div>
      <div class="input-actions">
        <button class="btn btn-secondary" onclick="clearInput()">清空</button>
        <button class="btn btn-primary" onclick="parseSlang()">🔍 解析黑话</button>
      </div>
    </section>

    <!-- Tab 内容区 -->
    <!-- 黑话解析结果 -->
    <section class="parser-result" id="parser-result">
      <div class="result-header">
        <div class="result-title">
          <span class="layer-icon">🎯</span>
          解析结果：<span class="result-slang" id="result-slang"></span>
        </div>
        <div class="risk-badge risk-medium" id="risk-badge">🟡 模糊表达</div>
      </div>
      <div class="parser-layers">
        <div class="layer-card surface">
          <div class="layer-header">
            <span class="layer-icon">🧠</span>
            <span class="layer-title">表面意思（官方翻译）</span>
          </div>
          <div class="layer-content" id="layer-surface">-</div>
        </div>
        <div class="layer-card hidden">
          <div class="layer-header">
            <span class="layer-icon">🧨</span>
            <span class="layer-title">潜台词（真实意思）</span>
          </div>
          <div class="layer-content" id="layer-hidden">-</div>
        </div>
        <div class="layer-card scene">
          <div class="layer-header">
            <span class="layer-icon">🎭</span>
            <span class="layer-title">场景解释</span>
          </div>
          <div class="layer-content" id="layer-scene">-</div>
        </div>
        <div class="layer-card strategy">
          <div class="layer-header">
            <span class="layer-icon">🧭</span>
            <span class="layer-title">应对策略</span>
          </div>
          <div class="layer-content" id="layer-strategy">-</div>
        </div>
      </div>
      <div class="ai-extensions">
        <button class="ext-btn" onclick="aiExtend('similar')"><span class="arrow">👉</span> 类似黑话还有哪些？</button>
        <button class="ext-btn" onclick="aiExtend('respond')"><span class="arrow">👉</span> 这个场景怎么回？</button>
        <button class="ext-btn" onclick="aiExtend('upgrade')"><span class="arrow">👉</span> 升级表达版本</button>
        <button class="ext-btn" id="save-slang-btn" onclick="saveCurrentSlang()"><span class="arrow">💾</span> 收录到黑话库</button>
      </div>
    </section>

    <!-- 黑话列表 -->
    <section class="tabs" id="slang-tabs" style="display:none">
      <button class="tab active" data-cat="all" onclick="filterCategory(this)">全部</button>
      <button class="tab" data-cat="boss" onclick="filterCategory(this)">🟡 上级常用</button>
      <button class="tab" data-cat="colleague" onclick="filterCategory(this)">🟢 同事协作</button>
      <button class="tab" data-cat="reject" onclick="filterCategory(this)">🔴 拒绝推脱</button>
      <button class="tab" data-cat="smart" onclick="filterCategory(this)">🟣 高情商</button>
      <button class="tab" data-cat="user" onclick="filterCategory(this)" style="border-color:var(--purple)">⭐ 我的贡献</button>
    </section>
    <div class="card-grid" id="card-grid" style="display:none"></div>

    <!-- 训练区 -->
    <section class="training-section" id="training-section" style="display:none">
      <h2 class="training-title"><span class="emoji">🎯</span> 我也会说黑话</h2>
      <p class="training-subtitle">把你的大白话翻译成职场黑话，分三个等级：直白版 → 职场版 → 高情商版</p>
      <div class="training-input-group">
        <input type="text" class="training-input" id="training-input" placeholder="输入你想表达的直白意思，例如：'这个不行'、'我不同意'、'太贵了'">
        <button class="btn btn-primary" onclick="trainSlang()">🚀 翻译</button>
      </div>
      <div class="training-results" id="training-results"></div>
    </section>
  </main>

  <footer class="footer">
    <p>嘴替 ZTalk · 让你听懂每一句没说出口的话</p>
    <p style="margin-top:8px;color:#666">Powered by AI · 仅供娱乐参考</p>
  </footer>

<script>
// ==================== 黑话数据库（从后端加载）====================
let SLANG_DATABASE = [];
let dbLoaded = false;

// ==================== API 配置 ====================
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
  ? 'http://localhost:8000' 
  : window.location.origin;

// 从后端加载黑话数据库
async function loadSlangDatabase() {
  try {
    const res = await fetch(`${API_BASE}/api/slang`);
    const data = await res.json();
    if (data.code === 0 && data.data && data.data.slangs) {
      SLANG_DATABASE = data.data.slangs;
      dbLoaded = true;
      console.log(`[嘴替] 已加载 ${SLANG_DATABASE.length} 条黑话`);
    }
  } catch (err) {
    console.warn('[嘴替] 无法连接后端，使用本地数据', err);
    SLANG_DATABASE = getLocalDatabase();
    dbLoaded = true;
  }
}

// 本地备用数据
function getLocalDatabase() {
  return [
    {slang:"赋能",category:"colleague",surface:"给权力、给能力，让别人能干活",hidden:"你能力不够，我给你机会锻炼（可能是坑）",scene:"职场常用表达，需要根据语境判断",strategy:"确认资源和权限是否真的给到位",risk:"medium"},
    {slang:"闭环",category:"colleague",surface:"事情做完形成完整链条",hidden:"你做事有头没尾，需要对结果负责",scene:"职场常用表达，需要根据语境判断",strategy:"主动汇报进度和结果",risk:"medium"},
    {slang:"落地",category:"colleague",surface:"把方案真正执行下去",hidden:"你的方案太虚了，需要可执行的步骤",scene:"职场常用表达，需要根据语境判断",strategy:"给出具体时间表和里程碑",risk:"medium"},
    {slang:"对齐",category:"colleague",surface:"让各方意见统一",hidden:"大家的理解不一致，需要重新同步",scene:"职场常用表达，需要根据语境判断",strategy:"提前了解各方立场",risk:"medium"},
    {slang:"拉通",category:"colleague",surface:"让相关部门达成共识",hidden:"各部门各自为战，需要协调",scene:"职场常用表达，需要根据语境判断",strategy:"明确需要拉通的人和议题",risk:"medium"},
    {slang:"迭代",category:"colleague",surface:"一次一次改，越来越好的过程",hidden:"当前版本有问题，需要改进",scene:"职场常用表达，需要根据语境判断",strategy:"问清楚要改哪些方面",risk:"medium"},
    {slang:"交付",category:"colleague",surface:"把做好的东西交出去",hidden:"你还没交东西，要催你了",scene:"职场常用表达，需要根据语境判断",strategy:"确认交付物的具体标准",risk:"medium"},
    {slang:"这个方案不错",category:"boss",surface:"方案获得认可",hidden:"表面认可，实际可能有问题，或者在敷衍你",scene:"上级可能：1) 不想直接否定你 2) 确实觉得还行但不是最好 3) 在给你面子",strategy:"追问具体哪里不错，或者问还有哪些可以优化的地方",risk:"medium"},
    {slang:"你再想想",category:"boss",surface:"让你重新思考",hidden:"你现在想的不对，需要重来",scene:"上级觉得你思考方向有问题，但又不想直接说'你错了'",strategy:"主动问：'我理解的 xxx 对吗？' 或者问具体哪里需要调整",risk:"high"},
    {slang:"我再看看",category:"boss",surface:"我再考虑一下",hidden:"我在想办法拒绝你，或者我真的还没想好",scene:"上级不想当场否定，给你留面子",strategy:"主动推进：'我这边还有几个备选方案，要不要一起看？'",risk:"high"},
    {slang:"最近有点忙",category:"reject",surface:"我工作很忙",hidden:"我不想帮你，或者在拖延",scene:"对方在委婉拒绝你",strategy:"具体化：'那下周呢？' 或者问优先级",risk:"high"},
    {slang:"后面再说",category:"reject",surface:"之后再讨论",hidden:"我不想现在谈，可能以后也不会",scene:"对方在敷衍你",strategy:"追问具体时间：'那具体什么时候呢？我先记着'",risk:"high"},
    {slang:"保持沟通",category:"smart",surface:"随时联系",hidden:"但我不一定会回复，或者这事儿不重要",scene:"给对方一个台阶，让对话自然结束",strategy:"确认沟通频率：'好的，那每周同步一次进度？'",risk:"low"},
  ];
}

// 页面加载时获取数据库
loadSlangDatabase();

// ==================== 页面切换 ====================
function switchTab(tab) {
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  const hero = document.getElementById('hero-section');
  const inputSection = document.getElementById('input-section');
  const parserResult = document.getElementById('parser-result');
  const slangTabs = document.getElementById('slang-tabs');
  const cardGrid = document.getElementById('card-grid');
  const trainingSection = document.getElementById('training-section');
  
  hero.style.display = 'none';
  inputSection.style.display = 'none';
  parserResult.style.display = 'none';
  slangTabs.style.display = 'none';
  cardGrid.style.display = 'none';
  trainingSection.style.display = 'none';
  
  if (tab === 'parser') {
    hero.style.display = 'block';
    inputSection.style.display = 'block';
  } else if (tab === 'list') {
    slangTabs.style.display = 'flex';
    cardGrid.style.display = 'grid';
    renderCards();
  } else if (tab === 'training') {
    trainingSection.style.display = 'block';
  }
}

// ==================== 解析黑话 ====================
function parseSlang() {
  const input = document.getElementById('slang-input').value.trim();
  if (!input) {
    alert('请输入黑话');
    return;
  }
  
  // 在数据库中查找
  const match = SLANG_DATABASE.find(item => 
    item.slang.includes(input) || input.includes(item.slang) ||
    fuzzyMatch(item.slang, input)
  );
  
  if (match) {
    currentSlang = match;
    showResult(match);
  } else {
    // AI 智能解析（模拟）
    showAIResult(input);
  }
}

function fuzzyMatch(text, query) {
  const similarity = text.split('').filter(c => query.includes(c)).length / text.length;
  return similarity > 0.5;
}

function showResult(data) {
  const result = document.getElementById('parser-result');
  document.getElementById('result-slang').textContent = data.slang;
  document.getElementById('layer-surface').textContent = data.surface;
  document.getElementById('layer-hidden').textContent = data.hidden;
  document.getElementById('layer-scene').textContent = data.scene;
  document.getElementById('layer-strategy').textContent = data.strategy;
  
  const badge = document.getElementById('risk-badge');
  badge.className = 'risk-badge';
  if (data.risk === 'low') {
    badge.classList.add('risk-low');
    badge.textContent = '🟢 低风险';
  } else if (data.risk === 'high') {
    badge.classList.add('risk-high');
    badge.textContent = '🔴 高风险';
  } else {
    badge.classList.add('risk-medium');
    badge.textContent = '🟡 模糊表达';
  }
  
  result.classList.add('show');
  result.scrollIntoView({behavior: 'smooth'});
  
  // 重置保存按钮状态
  const saveBtn = document.getElementById('save-slang-btn');
  saveBtn.innerHTML = '<span class="arrow">💾</span> 收录到黑话库';
  saveBtn.style.background = '';
  saveBtn.style.borderColor = '';
  saveBtn.disabled = false;
  
  // 检查是否已经在用户黑话库中
  const isSaved = USER_SLANGS.some(s => s.slang === data.slang);
  if (isSaved) {
    saveBtn.innerHTML = '<span class="arrow">✅</span> 已收录';
    saveBtn.style.background = 'var(--green)';
    saveBtn.style.borderColor = 'var(--green)';
    saveBtn.disabled = true;
  }
}

// ==================== AI 延伸学习 ====================
function aiExtend(type) {
  if (!currentSlang) return;
  
  let response = '';
  switch(type) {
    case 'similar':
      const similar = SLANG_DATABASE.filter(s => s.category === currentSlang.category && s.slang !== currentSlang.slang).slice(0, 3);
      response = '类似的表达还有：\n' + similar.map(s => `• "${s.slang}" - ${s.hidden}`).join('\n');
      break;
    case 'respond':
      response = `💡 建议回复方式：\n\n"明白了，您觉得这个方向上哪些地方需要调整呢？"\n\n这样可以：\n1. 表示理解但不卑微\n2. 主动引导对方说出具体问题\n3. 把球踢回给对方`;
      break;
    case 'upgrade':
      response = `🎯 如果你也想学会这种表达：\n\n直白版："这个不行"\n职场版："这个方案可能还需要再优化一下"\n高情商版："这个方向很有创意，我们可以再打磨一下细节"`;
      break;
  }
  
  alert(response);
}

// ==================== 分类筛选 ====================
function filterCategory(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = btn.dataset.cat;
  renderCards();
}

// ==================== 渲染卡片 ====================
function renderCards() {
  const grid = document.getElementById('card-grid');
  
  const categoryInfo = {
    boss: {title: '上级常用黑话', desc: '上级不想直接否定时的表达', icon: 'yellow', iconEmoji: '🟡'},
    colleague: {title: '同事/协作黑话', desc: '协作中常见的模糊表达', icon: 'green', iconEmoji: '🟢'},
    reject: {title: '拒绝/推脱黑话', desc: '可能被拒绝的信号', icon: 'red', iconEmoji: '🔴'},
    smart: {title: '高情商包装黑话', desc: '委婉但不失礼貌的表达', icon: 'purple', iconEmoji: '🟣'}
  };
  
  // 用户贡献分类
  const userInfo = {title: '我的贡献', desc: '你收录的黑话', icon: 'purple', iconEmoji: '⭐'};
  
  if (currentCategory === 'all') {
    // 按分类展示
    const categories = ['boss', 'colleague', 'reject', 'smart'];
    grid.innerHTML = categories.map(cat => {
      const info = categoryInfo[cat];
      const items = SLANG_DATABASE.filter(s => s.category === cat).slice(0, 4);
      return `
        <div class="scene-card" onclick="filterCategory(document.querySelector('[data-cat=${cat}]'))">
          <div class="card-header">
            <div class="card-icon ${info.icon}">${info.iconEmoji}</div>
            <div class="card-title">${info.title}</div>
          </div>
          <div class="card-desc">${info.desc}</div>
          <div class="slang-list">
            ${items.map(s => `<div class="slang-item" onclick="event.stopPropagation();selectSlang('${s.slang}')">${s.slang}</div>`).join('')}
          </div>
        </div>
      `;
    }).join('');
  } else if (currentCategory === 'user') {
    // 用户贡献的黑话
    if (USER_SLANGS.length === 0) {
      grid.innerHTML = `
        <div class="scene-card" style="text-align:center;padding:40px">
          <div style="font-size:48px;margin-bottom:16px">📝</div>
          <div style="color:var(--text-secondary);margin-bottom:16px">还没有贡献过黑话</div>
          <div style="color:var(--purple);font-size:14px">解析黑话后点击「收录到黑话库」即可贡献</div>
        </div>
      `;
    } else {
      grid.innerHTML = USER_SLANGS.map(s => `
        <div class="scene-card" onclick="selectSlang('${s.slang}')">
          <div class="card-header">
            <div class="card-icon purple">⭐</div>
            <div class="card-title">${s.slang}</div>
          </div>
          <div class="card-desc">${s.hidden || s.surface}</div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <span style="font-size:12px;color:var(--text-secondary)">${new Date(s.created_at).toLocaleDateString()}</span>
          </div>
        </div>
      `).join('');
    }
  } else {
    // 单分类展示
    const filtered = SLANG_DATABASE.filter(s => s.category === currentCategory);
    grid.innerHTML = filtered.map(s => `
      <div class="scene-card" onclick="selectSlang('${s.slang}')">
        <div class="card-header">
          <div class="card-icon ${categoryInfo[s.category].icon}">${categoryInfo[s.category].iconEmoji}</div>
          <div class="card-title">${s.slang}</div>
        </div>
        <div class="card-desc">${s.hidden}</div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <span class="risk-badge risk-${s.risk === 'low' ? 'low' : s.risk === 'high' ? 'high' : 'medium'}" style="font-size:12px">
            ${s.risk === 'low' ? '🟢 低风险' : s.risk === 'high' ? '🔴 高风险' : '🟡 模糊'}
          </span>
        </div>
      </div>
    `).join('');
  }
}

function selectSlang(slang) {
  document.getElementById('slang-input').value = slang;
  switchTab('parser');
  document.getElementById('slang-input').value = slang;
  parseSlang();
}

// ==================== 训练区 ====================
function trainSlang() {
  const input = document.getElementById('training-input').value.trim();
  if (!input) {
    alert('请输入你想表达的意思');
    return;
  }
  
  const results = document.getElementById('training-results');
  
  // 模拟 AI 翻译
  const translations = {
    '不行': {normal: '这个不行', work: '这个方案可能还需要再优化', smart: '这个方向很有创意，我们可以再打磨一下细节'},
    '不同意': {normal: '我不同意', work: '这个方案可能需要再讨论一下', smart: '这个想法很有价值，我们可以综合几个方案的优势'},
    '贵': {normal: '太贵了', work: '这个预算可能需要再评估一下', smart: '性价比方面可能还需要再优化'},
    '不会': {normal: '我不懂', work: '这块可能还需要再学习一下', smart: '这个领域我还在深入了解中'},
    '累': {normal: '太累了', work: '目前的工作强度确实比较大', smart: '这个阶段确实很有挑战性'},
    '加班': {normal: '要加班', work: '需要额外投入一些时间', smart: '这个项目需要我们全力以赴'},
  };
  
  let trans = null;
  for (const [key, value] of Object.entries(translations)) {
    if (input.includes(key)) {
      trans = value;
      break;
    }
  }
  
  if (!trans) {
    trans = {
      normal: input,
      work: input + '，可能还需要再考虑一下',
      smart: input + '，我们可以再探讨一下细节'
    };
  }
  
  results.innerHTML = `
    <div class="training-card normal">
      <div class="training-card-header"><span style="color:var(--red)">❌</span> 直白版</div>
      <div class="training-card-content">${trans.normal}</div>
    </div>
    <div class="training-card work">
      <div class="training-card-header"><span style="color:var(--yellow)">🟡</span> 职场版</div>
      <div class="training-card-content">${trans.work}</div>
    </div>
    <div class="training-card smart">
      <div class="training-card-header"><span style="color:var(--green)">🟢</span> 高情商版</div>
      <div class="training-card-content">${trans.smart}</div>
    </div>
  `;
}

function clearInput() {
  document.getElementById('slang-input').value = '';
  document.getElementById('parser-result').classList.remove('show');
}

// 回车键支持
document.getElementById('slang-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') parseSlang();
});

document.getElementById('training-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') trainSlang();
});

// ==================== 保存黑话到数据库 ====================
async function saveCurrentSlang() {
  if (!currentSlang) {
    alert('请先解析一个黑话');
    return;
  }
  
  const slang = currentSlang.slang;
  const surface = currentSlang.surface;
  const hidden = currentSlang.hidden;
  const scene = currentSlang.scene;
  const strategy = currentSlang.strategy;
  const category = currentSlang.category;
  const risk = currentSlang.risk;
  
  try {
    const res = await fetch(`${API_BASE}/api/slang/add`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        slang, surface, hidden, scene, strategy, category, risk
      })
    });
    
    const data = await res.json();
    if (data.code === 0) {
      USER_SLANGS.push(data.data);
      alert('✅ 已收录到黑话库！感谢你的贡献');
      // 更新保存按钮状态
      const saveBtn = document.getElementById('save-slang-btn');
      saveBtn.innerHTML = '<span class="arrow">✅</span> 已收录';
      saveBtn.style.background = 'var(--green)';
      saveBtn.style.borderColor = 'var(--green)';
      saveBtn.disabled = true;
    } else if (data.code === 1) {
      alert('这条黑话已经在库中了');
    }
  } catch (err) {
    console.error('保存失败:', err);
    alert('保存失败，请检查后端服务是否运行');
  }
}

// 加载用户贡献的黑话
async function loadUserSlangs() {
  try {
    const res = await fetch(`${API_BASE}/api/slang/user`);
    const data = await res.json();
    if (data.code === 0) {
      USER_SLANGS = data.data.user_slangs || [];
    }
  } catch (err) {
    console.error('加载用户黑话失败:', err);
  }
}

// 页面加载时获取用户黑话
loadUserSlangs();
