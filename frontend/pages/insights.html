<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>人格洞察 - 嘴替 ZTalk</title>
<style>
:root{--primary:#1a202c;--primary-light:#2d3748;--accent:#10B981;--accent2:#EF4444;--bg:#FFFFFF;--bg2:#F8FAFC;--bg3:#F1F5F9;--card:#FFFFFF;--text:#1a202c;--text2:#64748B;--text3:#94A3B8;--border:#E2E8F0;--header-height:56px;--tab-height:64px;--shadow-sm:0 1px 3px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;position:relative}
::-webkit-scrollbar{width:0}
.header{height:var(--header-height);background:var(--bg2);display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid var(--border)}
.header-logo{font-size:22px;font-weight:700;color:var(--text)}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-purple{background:rgba(99,102,241,.12);color:#6366F1}
.progress-bar-wrap{background:var(--bg3);border-radius:8px;height:8px;overflow:hidden;margin:8px 0}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:8px;transition:width .6s ease}
.insight-course{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:14px}
.course-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.course-level{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(99,102,241,.1);color:#6366F1}
.course-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.course-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:12px}
.video-placeholder{background:var(--bg3);border-radius:10px;border:1.5px dashed var(--border);height:80px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text3);margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.video-placeholder:active{border-color:var(--accent)}
.course-points{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.point-item{font-size:13px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:8px 12px;border-left:3px solid var(--accent);line-height:1.4}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.quiz-panel{margin-top:12px;background:var(--bg3);border-radius:10px;padding:14px;border:1px solid var(--border)}
.quiz-question{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:16px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{background:var(--bg3);border-radius:8px;padding:13px 16px;border:1.5px solid var(--border);cursor:pointer;font-size:14px;color:var(--text2);transition:all .18s;display:flex;align-items:center;gap:10px}
.quiz-option.correct{border-color:var(--success);color:var(--success);background:rgba(16,185,129,.1)}
.quiz-option.wrong{border-color:var(--accent2);color:var(--accent2);background:rgba(239,68,68,.1)}
.quiz-feedback{margin-top:10px;font-size:13px;font-weight:600;min-height:20px}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm)}
.card-inner{padding:14px 16px}
.section-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:16px 0 8px}
.input-field{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:12px 14px;outline:none;resize:vertical;min-height:80px}
.input-field:focus{border-color:var(--primary-light)}
.btn-primary{background:var(--accent);color:#fff}
.btn-full{width:100%}
#toast{position:fixed;bottom:calc(var(--tab-height) + 20px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">人格洞察</div>
  <div style="flex:1;font-size:11px;color:var(--text3);">读人·识人·驭人</div>
  <div class="badge badge-purple">Beta</div>
</div>

<div style="flex:1;overflow-y:auto;padding:16px;" id="insight-inner"></div>

<div id="toast"></div>

<script>
const insightCourses=[
  {id:1,level:'初级',title:'👁️ 肢体语言 · 一眼看穿对方底牌',desc:'从站姿、手势、手臂交叉到脚尖朝向，学习最直观的非语言信号。',points:['手臂交叉 → 防御或紧张','身体前倾 → 兴趣或攻击','脚尖朝向 → 真实关注方向','模仿动作 → 共情信号'],quiz:{q:'对方说话时频繁摸鼻子，通常表示？',options:['过敏','撒谎/紧张','思考','鼻子痒'],answer:'撒谎/紧张'}},
  {id:2,level:'初级',title:'😲 微表情 · 0.2秒的真实情绪',desc:'面部肌肉的瞬间抽搐——愤怒、恐惧、轻蔑无所遁形。',points:['单侧耸肩 → 怀疑','嘴角单侧上提 → 轻蔑','眼睑收紧 → 愤怒','假笑只有嘴动'],quiz:{q:'真正的微笑与假笑的最大区别？',options:['露牙齿','眼睛周围皱纹','持续时间','嘴巴形状'],answer:'眼睛周围皱纹'}},
  {id:3,level:'中级',title:'🎙️ 语调分析 · 声音里的魔鬼',desc:'音高、语速、停顿、重音——对方每句话都藏着情绪密码。',points:['语速突然加快 → 焦虑','音调升高 → 激动或撒谎','停顿延长 → 编造内容','音量变小 → 不自信'],quiz:{q:'谈判中对方突然压低音量且语速变慢，最可能？',options:['困了','故作镇定/施加压力','感冒','无所谓'],answer:'故作镇定/施加压力'}},
  {id:4,level:'中级',title:'💬 沟通风格 · DISC与色彩人格',desc:'识别支配型、影响型、稳健型、谨慎型，针对性反击。',points:['D型(支配)：直接打断，用事实怼','I型(影响)：热情但跑题，拉回主线','S型(稳健)：回避冲突，鼓励表达','C型(谨慎)：摆数据，逻辑碾压'],quiz:{q:'同事总爱说"我觉得""可能吧"，属于哪种风格？',options:['D支配型','C谨慎型','S稳健型','I影响型'],answer:'S稳健型'}},
  {id:5,level:'高级',title:'🏠 环境分析 · 空间与物品暴露本性',desc:'办公桌、车内装饰、家庭照片——环境是性格的延伸。',points:['杂乱桌面 → 创造力高但条理性差','家庭照片 → 重视归属感','奖杯证书 → 需要认可','极端整洁 → 控制欲强'],quiz:{q:'对方办公室挂满团队合照和个人奖牌，说明？',options:['炫耀','重视成就和认可','热爱工作','强迫症'],answer:'重视成就和认可'}},
  {id:6,level:'高级',title:'👔 外表分析 · 衣着配饰透露社会信号',desc:'发型、手表、鞋、纹身——外在符号背后的阶层与价值观。',points:['定制西装 → 追求细节与权力','运动手表 → 实用主义','夸张首饰 → 渴望关注','纹身位置 → 叛逆或纪念'],quiz:{q:'商务场合对方戴金戒指配玉扳指，暗示？',options:['传统权威/财富展示','时尚','宗教信仰','随便戴'],answer:'传统权威/财富展示'}}
];

let insightAnswered=new Set();

function renderInsight(){
  const inner=document.getElementById('insight-inner');
  const levelColor={'初级':'#10B981','中级':'#F59E0B','高级':'#EF4444'};
  
  let html=`
    <div style="background:var(--card);border-radius:12px;padding:14px;margin-bottom:18px;border:1px solid var(--border);">
      <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:8px;">📈 学习曲线</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
        ${insightCourses.map(c=>`<span class="badge" style="background:rgba(16,185,129,.1);color:#10B981;">${c.level} ${c.title.split('·')[0].trim()}</span>`).join('')}
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:0%" id="insight-progress-bar"></div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:6px;">完成所有课程解锁「分析大师」徽章 🧠</div>
    </div>
  `;
  
  insightCourses.forEach((course,idx)=>{
    const lc=levelColor[course.level]||'#10B981';
    html+=`
      <div class="insight-course" data-course-id="${course.id}">
        <div class="course-header">
          <span class="course-level" style="background:${lc}15;color:${lc};">${course.level}</span>
          <span style="font-size:11px;color:var(--text3);">🎓 实战案例</span>
        </div>
        <div class="course-title">${course.title}</div>
        <div class="course-desc">${course.desc}</div>
        <div class="video-placeholder" onclick="showVideoTip()">
          <span>▶️ 点击播放视频教学</span>
        </div>
        <div class="course-points">
          ${course.points.map(p=>`<div class="point-item">📌 ${p}</div>`).join('')}
        </div>
        <button class="btn btn-outline" style="width:100%;" onclick="toggleInsightQuiz(${idx})">📝 课后测验</button>
        <div class="quiz-panel" id="iquiz-${idx}" style="display:none;">
          <div class="quiz-question" style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;">${course.quiz.q}</div>
          <div id="iquiz-opts-${idx}">
            ${course.quiz.options.map(opt=>`
              <div class="quiz-option" data-opt="${opt}" data-correct="${course.quiz.answer}" data-idx="${idx}" onclick="handleInsightQuiz(this)">${opt}</div>
            `).join('')}
          </div>
          <div class="quiz-feedback" id="iquiz-fb-${idx}"></div>
        </div>
      </div>
    `;
  });
  
  html+=`
    <div class="card" style="margin-top:4px;">
      <div class="card-inner">
        <div class="section-title">🤖 AI实时分析模拟器（Beta）</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6;">粘贴对话内容，AI将分析对方的情绪和人格特质。</div>
        <textarea id="insight-text" class="input-field" rows="3" placeholder="粘贴对话内容..."></textarea>
        <button class="btn btn-primary btn-full" style="margin-top:10px;" onclick="runInsightAnalysis()">🔍 AI 人格分析</button>
        <div id="insight-result" style="margin-top:12px;font-size:13px;display:flex;flex-direction:column;gap:6px;"></div>
      </div>
    </div>
    <div style="height:16px;"></div>
  `;
  
  inner.innerHTML=html;
}

function showVideoTip(){
  showToast('视频播放功能开发中... 🎬');
}

function toggleInsightQuiz(idx){
  const panel=document.getElementById(`iquiz-${idx}`);
  if(!panel)return;
  const isHidden=panel.style.display==='none';
  panel.style.display=isHidden?'block':'none';
}

function handleInsightQuiz(el){
  const selected=el.dataset.opt;
  const correct=el.dataset.correct;
  const idx=el.dataset.idx;
  const fbDiv=document.getElementById(`iquiz-fb-${idx}`);
  
  el.parentElement.querySelectorAll('.quiz-option').forEach(o=>{
    o.style.pointerEvents='none';
    if(o.dataset.opt===correct)o.classList.add('correct');
  });
  
  if(selected===correct){
    el.classList.add('correct');
    fbDiv.innerHTML='<span style="color:var(--success);">✅ 正确！你已掌握这个知识点。</span>';
    showToast('🎉 答对了！继续下一个课程');
    updateInsightProgress();
  }else{
    el.classList.add('wrong');
    fbDiv.innerHTML=`<span style="color:var(--accent2);">❌ 错误。正确答案是：${correct}。再看一遍课程吧。</span>`;
    showToast('❌ 答错了，再学一遍');
  }
}

function updateInsightProgress(){
  insightAnswered.add(1);
  const pct=Math.round((insightAnswered.size/insightCourses.length)*100);
  const bar=document.getElementById('insight-progress-bar');
  if(bar)bar.style.width=pct+'%';
  if(insightAnswered.size===insightCourses.length){
    showToast('🎓 人格分析大师！全部课程完成！');
  }
}

function runInsightAnalysis(){
  const text=document.getElementById('insight-text')?.value?.trim();
  if(!text){showToast('请先输入对话内容');return;}
  
  const result=document.getElementById('insight-result');
  result.innerHTML=`<div class="point-item" style="color:var(--text3);">⏳ AI分析中...</div>`;
  showToast('🤖 分析中...');
  
  const profiles=[
    {type:'D支配型',icon:'🔴',hint:'语气强势、直接打断，建议用数据和结果回应。'},
    {type:'S稳健型',icon:'🟢',hint:'措辞保守、回避冲突，建议鼓励其表达顾虑。'},
    {type:'C谨慎型',icon:'🔵',hint:'逻辑缜密、细节导向，建议提供详细数据支撑。'},
    {type:'I影响型',icon:'🟡',hint:'热情活跃、容易跑题，建议适时拉回主线。'}
  ];
  const picked=profiles[Math.floor(Math.random()*profiles.length)];
  
  setTimeout(()=>{
    result.innerHTML=`
      <div class="point-item">🧠 <strong>初步人格判断：${picked.icon} ${picked.type}</strong></div>
      <div class="point-item">💡 应对建议：${picked.hint}</div>
      <div class="point-item">📊 情绪状态：检测到轻微防御倾向，建议保持开放式提问。</div>
      <div class="point-item">🎯 推荐话术：「你刚才提到的那点，能再具体说明一下吗？」</div>
    `;
  },900);
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// 初始化
renderInsight();
</script>

</body>
</html>
